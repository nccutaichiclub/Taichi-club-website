<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法門深造｜政大太極社</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --玄色: #121212; --霧霾灰: #A0A0A0; --松柏綠: #5C9A6C; /* 將綠色稍微調亮，增加對比度 */ --古銅金: #C5A059; --仙氣白: #E5E5E5;
        }
        body { background-color: var(--玄色); color: var(--仙氣白); font-family: 'Noto Serif TC', serif; margin: 0; line-by-line: 1.8; }
        .container { max-width: 800px; margin: 60px auto; padding: 0 20px; }
        h1 { color: var(--古銅金); text-align: center; letter-spacing: 4px; font-size: 2.2rem; }
        .subtitle { text-align: center; color: var(--霧霾灰); font-style: italic; margin-bottom: 60px; font-size: 0.95rem; }

        .gongfa-detail {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(160, 160, 160, 0.15);
            padding: 40px;
            border-radius: 12px;
            margin-bottom: 60px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 修復後的標題樣式 */
        .gongfa-detail h2 {
            color: var(--松柏綠);
            background-color: rgba(160, 160, 160, 0.15); /* 霧霾灰底框 */
            display: inline-block; /* 讓框隨文字長度縮放 */
            padding: 10px 18px; /* 內部留白 */
            font-size: 1.6rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            border-left: 4px solid var(--古銅金);
            border-right: 4px solid var(--古銅金);
        }

        /* 內文段落間距：文字現在會被自動包成一段一段的 <p>，這裡統一控制段落間的留白 */
        .gongfa-text p {
            margin: 0 0 16px 0;
        }
        .gongfa-text p:last-child {
            margin-bottom: 0;
        }

        /* 影片預留區樣式 */
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #1A1A1A; border: 1px solid #333; }
        .video-placeholder { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--霧霾灰); }
        .video-placeholder i { font-size: 2rem; margin-bottom: 10px; color: var(--古銅金); }
    </style>
</head>
<body>

    <!-- 跨頁面導覽列：文字內容改由 data/home.json 的 nav 欄位統一控管，
         這樣你在後台「首頁主殿管理」改一次選單文字，全站每一頁都會一起更新，不用每頁分開改 -->
    <nav style="background: rgba(18, 18, 18, 0.95); border-bottom: 1px solid #2A2A2A; padding: 20px; text-align: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(5px);">
        <a href="index.html" id="nav-link-home" style="color: #A0A0A0; text-decoration: none; margin: 0 20px; letter-spacing: 2px;">首頁主殿</a>
        <a href="gongfa.html" id="nav-link-method" style="color: var(--古銅金); text-decoration: none; margin: 0 20px; letter-spacing: 2px; font-weight: bold;">法門深造</a>
        <a href="calendar.html" id="nav-link-calendar" style="color: #A0A0A0; text-decoration: none; margin: 0 20px; letter-spacing: 2px;">修煉日程</a>
    </nav>

    <div class="container">
        <h1 id="page-title">四大法門深探</h1>
        <div class="subtitle" id="page-subtitle">「由淺入深，由動入靜。此處記載本門核心武學之微言大義與演武示範。」</div>

       <!-- 動態功法載入區塊 -->
        <div id="gongfa-container">
            <div style="text-align:center; color:var(--霧霾灰);">正在翻閱藏經閣，載入法門中...</div>
        </div>

        <!-- 串接後台資料的 JavaScript -->
        <script>
            // 把後台填的「純文字」自動轉成一段一段的 <p>：
            // 空一行 = 分段；段落內單純換行 = 換行(<br>)。
            // 這樣後台不用寫任何 HTML 標籤，打字習慣照打就好。
            function paragraphize(text) {
                if (!text) return '';
                return text
                    .split(/\n\s*\n/)
                    .map(p => `<p>${p.trim().replace(/\n/g, '<br>')}</p>`)
                    .join('');
            }

            // 從各種常見的 YouTube 網址格式（分享連結、短網址、embed 連結）擷取出影片 ID
            function extractYouTubeId(url) {
                if (!url) return null;
                const patterns = [
                    /youtube\.com\/watch\?v=([\w-]{11})/,
                    /youtu\.be\/([\w-]{11})/,
                    /youtube\.com\/embed\/([\w-]{11})/
                ];
                for (const pattern of patterns) {
                    const match = url.match(pattern);
                    if (match) return match[1];
                }
                return null;
            }

            // 導覽列文字：讀取 data/home.json 的 nav 設定，跟首頁共用同一份資料
            fetch('data/home.json')
                .then(response => response.json())
                .then(data => {
                    if (!data.nav) return;
                    const homeLink = document.getElementById('nav-link-home');
                    const methodLink = document.getElementById('nav-link-method');
                    const calendarLink = document.getElementById('nav-link-calendar');
                    if (homeLink && data.nav.link_home) homeLink.innerText = data.nav.link_home;
                    if (methodLink && data.nav.link_method) methodLink.innerText = data.nav.link_method;
                    if (calendarLink && data.nav.link_calendar) calendarLink.innerText = data.nav.link_calendar;
                })
                .catch(error => console.error('讀取 data/home.json 失敗：', error));

            // 本頁主要內容：讀取 data/gongfa.json
            fetch('data/gongfa.json')
                .then(response => response.json())
                .then(data => {
                    if (data.page_title) {
                        document.getElementById('page-title').innerText = data.page_title;
                    }
                    if (data.page_subtitle) {
                        document.getElementById('page-subtitle').innerText = data.page_subtitle;
                    }

                    const container = document.getElementById('gongfa-container');
                    container.innerHTML = '';

                    (data.methods || []).forEach(method => {
                        const videoId = extractYouTubeId(method.video_url);
                        const videoContent = videoId
                            ? `<iframe src="https://www.youtube.com/embed/${videoId}" title="${method.title}"
                                   style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;"
                                   allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                                   allowfullscreen></iframe>`
                            : `<div class="video-placeholder">
                                   <span>☯️ 功法招式演練．影像準備中 ☯️</span>
                               </div>`;

                        const methodHTML = `
                            <div class="gongfa-detail">
                                <h2>${method.title}</h2>
                                <div class="gongfa-text">${paragraphize(method.desc)}</div>
                                <div class="video-container">
                                    ${videoContent}
                                </div>
                            </div>
                        `;
                        container.innerHTML += methodHTML;
                    });
                })
                .catch(error => {
                    document.getElementById('gongfa-container').innerHTML = '<div style="text-align:center; color:red;">藏經閣大門深鎖，載入失敗。</div>';
                });
        </script>

    </div>

</body>
</html>
