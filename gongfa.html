<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法門深造｜政大太極社</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --玄色: #121212; --霧霾灰: #A0A0A0; --松柏綠: #5C9A6C; /* 將綠色稍微調亮，增加對比度 */ --古銅金: #C5A059; --仙氣白: #E5E5E5;
        }
        body { background-color: var(--玄色); color: var(--仙氣白); font-family: 'Noto Serif TC', serif; margin: 0; line-by-line: 1.8; }
        .container { max-width: 800px; margin: 60px auto; padding: 0 20px; }
        h1 { color: var(--古銅金); text-align: center; letter-spacing: 4px; font-size: 2.2rem; }
        .subtitle { text-align: center; color: var(--霧霾灰); font-style: italic; margin-bottom: 60px; font-size: 0.95rem; }
        
        .gongfa-detail { 
            background-color: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(160, 160, 160, 0.15); 
            padding: 40px; 
            border-radius: 12px; 
            margin-bottom: 60px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        
        /* 修復後的標題樣式 */
        .gongfa-detail h2 { 
            color: var(--松柏綠); 
            background-color: rgba(160, 160, 160, 0.15); /* 霧霾灰底框 */
            display: inline-block; /* 讓框隨文字長度縮放 */
            padding: 10px 18px; /* 內部留白 */
            font-size: 1.6rem; 
            letter-spacing: 2px; 
            margin-bottom: 20px; 
            border-left: 4px solid var(--古銅金); 
            border-right: 4px solid var(--古銅金); 
        }
        
        /* 影片預留區樣式 */
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #1A1A1A; border: 1px solid #333; }
        .video-placeholder { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--霧霾灰); }
        .video-placeholder i { font-size: 2rem; margin-bottom: 10px; color: var(--古銅金); }
    </style>
</head>
<body>

    <!-- 跨頁面導覽列 -->
    <nav style="background: rgba(18, 18, 18, 0.95); border-bottom: 1px solid #2A2A2A; padding: 20px; text-align: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(5px);">
        <a href="index.html" style="color: #A0A0A0; text-decoration: none; margin: 0 20px; letter-spacing: 2px;">首頁主殿</a>
        <a href="gongfa.html" style="color: var(--古銅金); text-decoration: none; margin: 0 20px; letter-spacing: 2px; font-weight: bold;">法門深造</a>
        <a href="calendar.html" style="color: #A0A0A0; text-decoration: none; margin: 0 20px; letter-spacing: 2px;">修煉日程</a>
    </nav>

    <div class="container">
        <h1>四大法門深探</h1>
        <div class="subtitle">「由淺入深，由動入靜。此處記載本門核心武學之微言大義與演武示範。」</div>

       <!-- 動態功法載入區塊 -->
        <div id="gongfa-container">
            <div style="text-align:center; color:var(--霧霾灰);">正在翻閱藏經閣，載入法門中...</div>
        </div>

        <!-- 串接後台資料的 JavaScript -->
        <script>
            fetch('data/gongfa.json')
                .then(response => response.json())
                .then(data => {
                    const container = document.getElementById('gongfa-container');
                    container.innerHTML = ''; 
                    
                    data.methods.forEach(method => {
                        const videoContent = method.video && method.video.trim() !== "" 
                            ? method.video 
                            : `<div class="video-placeholder">
                                   <span>☯️ 功法招式演練．影像準備中 ☯️</span>
                               </div>`;

                        const methodHTML = `
                            <div class="gongfa-detail">
                                <h2>${method.title}</h2>
                                <div class="gongfa-text">${method.desc}</div>
                                <div class="video-container">
                                    ${videoContent}
                                </div>
                            </div>
                        `;
                        container.innerHTML += methodHTML;
                    });
                })
                .catch(error => {
                    document.getElementById('gongfa-container').innerHTML = '<div style="text-align:center; color:red;">藏經閣大門深鎖，載入失敗。</div>';
                });
        </script>

    </div>

</body>
</html>
