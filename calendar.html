<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修煉日程｜政大太極社</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --玄色: #121212; --霧霾灰: #A0A0A0; --松柏綠: #1C3A27; --古銅金: #C5A059; --仙氣白: #E5E5E5;
        }
        body { background-color: var(--玄色); color: var(--仙氣白); font-family: 'Noto Serif TC', serif; margin: 0; line-by-line: 1.8; }
        .container { max-width: 900px; margin: 60px auto; padding: 0 20px; }
        h1 { color: var(--古銅金); text-align: center; letter-spacing: 4px; font-size: 2.2rem; margin-bottom: 10px; }
        .subtitle { text-align: center; color: var(--霧霾灰); font-style: italic; margin-bottom: 50px; font-size: 0.95rem; }
        
        /* 曆法表格樣式 */
        .calendar-table { width: 100%; border-collapse: collapse; margin-top: 30px; background: #1A1A1A; border: 1px solid #2A2A2A; }
        .calendar-table th { background-color: var(--松柏綠); color: var(--古銅金); padding: 15px; text-align: left; font-weight: 700; border-bottom: 2px solid #2A2A2A; letter-spacing: 2px; }
        .calendar-table td { padding: 20px 15px; border-bottom: 1px solid #2A2A2A; color: var(--仙氣白); }
        .calendar-table tr:hover { background-color: #222222; }
        .event-tag { display: inline-block; padding: 2px 8px; font-size: 0.8rem; border-radius: 3px; margin-right: 5px; }
        .tag-daily { background-color: #2A3A4A; color: #80A0C0; }
        .tag-special { background-color: #4A2A2A; color: #C08080; }
    </style>
</head>
<body>

    <!-- 跨頁面導覽列 -->
    <nav style="background: rgba(18, 18, 18, 0.95); border-bottom: 1px solid #2A2A2A; padding: 20px; text-align: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(5px);">
        <a href="index.html" style="color: #A0A0A0; text-decoration: none; margin: 0 20px; letter-spacing: 2px;">首頁主殿</a>
        <a href="gongfa.html" style="color: #A0A0A0; text-decoration: none; margin: 0 20px; letter-spacing: 2px;">法門深造</a>
        <a href="calendar.html" style="color: var(--古銅金); text-decoration: none; margin: 0 20px; letter-spacing: 2px; font-weight: bold;">修煉日程</a>
    </nav>

    <div class="container">
        <h1>四時曆法</h1>
        <div class="subtitle">「順應天時，不期而遇。此乃本門弟子紅塵與山林修煉之引導。」</div>
        
        <table class="calendar-table">
            <thead>
                <tr>
                    <th style="width: 25%;">時節 / 週期</th>
                    <th style="width: 50%;">修行法事</th>
                    <th style="width: 25%;">修煉據點</th>
                </tr>
            </thead>
            <tbody id="calendar-body">
                <!-- 這裡的內容將由 JavaScript 自動從後台資料庫載入 -->
                <tr><td colspan="3" style="text-align:center; color:#A0A0A0;">正在感應天時，載入曆法中...</td></tr>
            </tbody>
        </table>

        <!-- 串接後台資料庫的 JavaScript 法陣 -->
        <script>
            fetch('data/calendar.json')
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('calendar-body');
                    tbody.innerHTML = ''; // 清空載入中文字
                    
                    data.events.forEach(event => {
                        // 判斷標籤顏色：如果是常課就用藍灰底，其餘用紅棕底
                        const tagClass = (event.type === '常課') ? 'tag-daily' : 'tag-special';
                        
                        const row = `
                            <tr>
                                <td><strong>${event.time}</strong></td>
                                <td>
                                    <span class="event-tag ${tagClass}">${event.type}</span>
                                    <strong>${event.title}</strong><br>
                                    <span style="color: var(--霧霾灰); font-size: 0.9rem;">${event.desc}</span>
                                </td>
                                <td>${event.location}</td>
                            </tr>
                        `;
                        tbody.innerHTML += row;
                    });
                })
                .catch(error => {
                    document.getElementById('calendar-body').innerHTML = '<tr><td colspan="3" style="text-align:center; color:red;">曆法載入失敗，請確認資料庫陣法。</td></tr>';
                });
        </script>
    </div>

</body>
</html>
